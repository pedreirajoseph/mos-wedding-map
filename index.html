<style>
  html,body{height:100%;margin:0;padding:0;overflow:hidden;background:#0d0d0d;font-family:Arial,Helvetica,sans-serif;}
  #wrap{height:100%;box-sizing:border-box;display:flex;flex-direction:column;max-width:1200px;margin:0 auto;padding:8px 12px 10px;}
  #cap{flex:0 0 auto;color:#cfcfcf;font-size:15px;margin:2px 2px 8px;min-height:20px;text-align:center;}
  #cap b{color:#F2871E;}
  #mapbox{flex:1 1 auto;min-height:0;position:relative;width:100%;background:#0d0d0d;border:1px solid #262626;border-radius:14px;overflow:hidden;}
  #btns{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:6px;z-index:5;}
  #btns button{width:42px;height:42px;background:#161616;color:#F2871E;border:1px solid #444;border-radius:9px;font-size:24px;line-height:1;cursor:pointer;}
  #btns button:hover{background:#222;}
  #card{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:min(340px,92%);max-height:88%;overflow:auto;-webkit-overflow-scrolling:touch;background:#161616;border:1px solid #3a3a3a;border-radius:14px;box-shadow:0 10px 34px rgba(0,0,0,.6);display:none;z-index:10;color:#eee;text-align:left;}
  #cardbg{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;z-index:9;}
  #card .hero{width:100%;height:clamp(72px,22vh,150px);object-fit:cover;display:block;background:#222;}
  #card .body{padding:11px 13px 13px;}
  #card .nm{color:#FF951E;font-weight:bold;font-size:clamp(15px,4.2vw,17px);line-height:1.2;padding-right:30px;}
  #card .ad{color:#bdbdbd;font-size:clamp(12px,3.4vw,13px);margin-top:4px;line-height:1.4;}
  #card .films{margin-top:11px;display:flex;flex-direction:column;gap:8px;}
  #card .btn{display:block;text-align:center;background:#F2871E;color:#161616;text-decoration:none;font-weight:bold;font-size:clamp(13px,3.6vw,14px);padding:11px;border-radius:9px;}
  #card .filmrow{display:flex;align-items:center;gap:10px;background:#1f1f1f;border:1px solid #333;border-radius:9px;padding:7px 9px;text-decoration:none;color:#FF951E;font-weight:bold;font-size:clamp(12.5px,3.4vw,13.5px);}
  #card .filmrow .ft{width:64px;height:40px;object-fit:cover;border-radius:5px;flex:0 0 auto;background:#333;}
  #card .x{position:absolute;top:8px;right:10px;width:32px;height:32px;border:0;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;z-index:2;}
  .legend{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;color:#8a8a8a;font-size:13px;text-align:center;}
  .legend .dot{width:11px;height:11px;border-radius:50%;background:#F2871E;display:inline-block;}
  #search{position:absolute;left:12px;top:12px;z-index:6;width:min(270px,62%);}
  #search input{width:100%;box-sizing:border-box;background:#161616;color:#eee;border:1px solid #4a4a4a;border-radius:9px;padding:9px 12px;font-size:14px;outline:none;}
  #search input:focus{border-color:#F2871E;}
  #search input::placeholder{color:#8a8a8a;}
  #sres{margin-top:5px;background:#161616;border:1px solid #333;border-radius:9px;overflow:hidden;display:none;box-shadow:0 8px 22px rgba(0,0,0,.5);}
  #sres div{padding:9px 12px;font-size:13px;color:#eee;cursor:pointer;border-bottom:1px solid #262626;}
  #sres div:last-child{border-bottom:0;}
  #sres div:hover{background:#222;}
  #sres .city{color:#8a8a8a;font-size:11.5px;}
  #sres .film{color:#FF951E;font-size:11px;margin-left:6px;}
  svg{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
</style>

var W=1000,H=620;
var svg=d3.select("#mapbox").append("svg").attr("viewBox","0 0 "+W+" "+H).attr("preserveAspectRatio","xMidYMid meet");
var cap=document.getElementById("cap"),card=document.getElementById("card"),bg=document.getElementById("cardbg");
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function ytId(u){var m=String(u).match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([\w-]{11})/);return m?m[1]:"";}
function ytThumb(u){var id=ytId(u);return id?("https://img.youtube.com/vi/"+id+"/hqdefault.jpg"):"";}
function openCard(v){
  var hero=v.photo||(v.films&&v.films.length?ytThumb(v.films[0].url):"");
  var h='<button class="x" aria-label="Close">&times;</button>';
  if(hero)h+='<img class="hero" src="'+esc(hero)+'" alt="" onerror="this.style.display=\'none\'">';
  h+='<div class="body"><div class="nm">'+esc(v.n)+'</div>';
  h+='<div class="ad">'+esc(v.c)+(v.a?' &nbsp;·&nbsp; '+esc(v.a):'')+'</div>';
  if(v.films&&v.films.length===1){var f=v.films[0];h+='<div class="films"><a class="btn" href="'+esc(f.url)+'" target="_blank" rel="noopener">▶ '+esc(f.label||"Watch our film")+'</a></div>';}
  else if(v.films&&v.films.length>1){h+='<div class="films">'+v.films.map(function(f,i){var t=ytThumb(f.url);return '<a class="filmrow" href="'+esc(f.url)+'" target="_blank" rel="noopener">'+(t?'<img class="ft" src="'+esc(t)+'" alt="" onerror="this.style.display=\'none\'">':'')+'<span>▶ '+esc(f.label||("Film "+(i+1)))+'</span></a>';}).join('')+'</div>';}
  h+='</div>';
  card.innerHTML=h;card.style.display='block';bg.style.display='block';
  card.querySelector('.x').onclick=function(e){e.stopPropagation();closeCard();};
}
function closeCard(){card.style.display='none';bg.style.display='none';}
function parseCSV(text){var rows=[],row=[],cur="",q=false;for(var i=0;i<text.length;i++){var c=text[i];if(q){if(c=='"'){if(text[i+1]=='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c=='"')q=true;else if(c==','){row.push(cur);cur="";}else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur="";}else if(c=='\r'){}else cur+=c;}}if(cur!==""||row.length){row.push(cur);rows.push(row);}return rows;}
function rowsToVenues(rows){
  if(!rows.length)return[];
  var h=rows[0].map(function(x){return x.trim().toLowerCase();});
  function idx(names){for(var n=0;n<names.length;n++){var k=h.indexOf(names[n]);if(k>=0)return k;}return -1;}
  var iN=idx(["venue","name"]),iC=idx(["city"]),iA=idx(["address"]),iLat=idx(["latitude","lat"]),iLng=idx(["longitude","lng","long"]),iP=idx(["photo","photo url","image","image url","photo (image url)"]),iF=idx(["film links (comma-separated)","film links","film link","films","film link (youtube)"]);
  var out=[];
  for(var r=1;r<rows.length;r++){var row=rows[r];if(!row)continue;var n=(row[iN]||"").trim();if(!n)continue;var lat=parseFloat(row[iLat]),lng=parseFloat(row[iLng]);if(isNaN(lat)||isNaN(lng))continue;
    var films=[];if(iF>=0&&row[iF]){films=row[iF].split(",").map(function(s){return s.trim();}).filter(function(s){return s;}).map(function(s){var p=s.split("|");return p.length>1?{label:p[0].trim(),url:p.slice(1).join("|").trim()}:{label:"",url:s};});}
    out.push({n:n,c:(row[iC]||"").trim(),a:iA>=0?(row[iA]||"").trim():"",photo:iP>=0?(row[iP]||"").trim():"",lat:lat,lng:lng,films:films});}
  return out;
}
function loadVenues(){if(!CSV_URL)return Promise.resolve(FALLBACK_VENUES);return fetch(CSV_URL).then(function(r){return r.text();}).then(function(t){var v=rowsToVenues(parseCSV(t));return v.length?v:FALLBACK_VENUES;}).catch(function(){return FALLBACK_VENUES;});}

function draw(us,venues){
  var pts={type:"FeatureCollection",features:venues.map(function(v){return {type:"Feature",geometry:{type:"Point",coordinates:[v.lng,v.lat]}};})};
  var proj=d3.geoMercator().fitExtent([[70,40],[W-70,H-40]],pts);
  var path=d3.geoPath(proj);
  var g=svg.append("g");
  g.append("g").selectAll("path").data(topojson.feature(us,us.objects.states).features).join("path").attr("class","state").attr("d",path).attr("fill","#1b1b1b").attr("stroke","#363636").attr("stroke-width",0.7);
  venues.forEach(function(v){var p=proj([v.lng,v.lat]);v._x=p[0];v._y=p[1];});

  var legLayer=g.append("g"),dotLayer=g.append("g");
  var legs=legLayer.selectAll("line").data(venues).join("line").attr("stroke","#FF951E").attr("stroke-opacity",0.75).attr("stroke-linecap","round").style("display","none");
  var vg=dotLayer.selectAll("g.v").data(venues).join("g").attr("class","v").style("cursor","pointer").on("click",onClick);
  vg.append("circle").attr("class","ring").attr("fill","none").attr("stroke","#F2871E").attr("stroke-opacity",0.55).style("display","none");
  vg.append("circle").attr("class","halo").attr("fill","#F2871E").attr("fill-opacity",0.2);
  vg.append("circle").attr("class","viz").attr("fill","#FF951E").attr("fill-opacity",0.98).attr("stroke","#1a1a1a");
  var hit=vg.append("circle").attr("class","hit").attr("fill","transparent").style("pointer-events","all");
  hit.append("title").text(function(d){return d.n+" — "+d.c;});

  var groups=[],spiderId=null,curK=1;
  function cluster(k){
    var T=15/k;groups=[];venues.forEach(function(v){v._g=-1;});var ci=0;
    for(var i=0;i<venues.length;i++){if(venues[i]._g>=0)continue;var mem=[i];venues[i]._g=ci;var grow=true;
      while(grow){grow=false;for(var j=0;j<venues.length;j++){if(venues[j]._g>=0)continue;for(var m=0;m<mem.length;m++){var a=venues[mem[m]],b=venues[j],dx=a._x-b._x,dy=a._y-b._y;if(dx*dx+dy*dy<T*T){b._g=ci;mem.push(j);grow=true;break;}}}}
      var cx=0,cy=0;mem.forEach(function(mi){cx+=venues[mi]._x;cy+=venues[mi]._y;});groups.push({cx:cx/mem.length,cy:cy/mem.length,members:mem});ci++;}
  }
  function layout(k){
    curK=k;cluster(k);
    if(spiderId!=null&&(!groups[spiderId]||groups[spiderId].members.length<2))spiderId=null;
    venues.forEach(function(v){v._px=v._x;v._py=v._y;v._spider=false;});
    if(spiderId!=null){var grp=groups[spiderId],n=grp.members.length,legScreen=Math.min(22+5*n,95),R=legScreen/k;
      grp.members.forEach(function(mi,idx){var ang=(idx/n)*2*Math.PI-Math.PI/2;venues[mi]._px=grp.cx+Math.cos(ang)*R;venues[mi]._py=grp.cy+Math.sin(ang)*R;venues[mi]._spider=true;});}
    vg.attr("transform",function(d){return "translate("+d._px+","+d._py+")";});
    legs.each(function(d){var L=d3.select(this);if(d._spider){var grp=groups[d._g];L.style("display",null).attr("x1",grp.cx-d._px).attr("y1",grp.cy-d._py).attr("x2",0).attr("y2",0).attr("stroke-width",1.3/k);}else L.style("display","none");});
    var dr=Math.max(3.2,Math.min(2.6*k,8.5)),desiredHit=(dr*1.9)/k,vizR=dr/k;
    for(var a2=0;a2<venues.length;a2++){var va=venues[a2],best=1e9;for(var b2=0;b2<venues.length;b2++){if(b2===a2)continue;var ddx=va._px-venues[b2]._px,ddy=va._py-venues[b2]._py,dd=Math.sqrt(ddx*ddx+ddy*ddy);if(dd<best)best=dd;}va._hit=Math.max(vizR,Math.min(desiredHit,best*0.48));}
    vg.select("circle.halo").attr("r",(dr*1.5)/k);
    vg.select("circle.viz").attr("r",vizR).attr("stroke-width",1.1/k);
    vg.select("circle.hit").attr("r",function(d){return d._hit;});
    vg.select("circle.ring").style("display",function(d){return (groups[d._g]&&groups[d._g].members.length>1&&!d._spider)?null:"none";}).attr("r",(dr*1.95)/k).attr("stroke-width",1.1/k);
    g.selectAll("path.state").attr("stroke-width",0.7/k);
  }
  function onClick(e,d){e.stopPropagation();var grp=groups[d._g];
    if(grp&&grp.members.length>1&&spiderId!==d._g){spiderId=d._g;layout(curK);}
    else openCard(d);}
  var zoom=d3.zoom().scaleExtent([1,40]).on("zoom",function(ev){spiderId=null;g.attr("transform",ev.transform);layout(ev.transform.k);});
  svg.call(zoom);
  svg.on("click",function(){spiderId=null;closeCard();layout(curK);});
  bg.onclick=function(){spiderId=null;closeCard();layout(curK);};
  layout(1);
  document.getElementById("zin").onclick=function(){svg.transition().duration(300).call(zoom.scaleBy,1.8);};
  document.getElementById("zout").onclick=function(){svg.transition().duration(300).call(zoom.scaleBy,1/1.8);};
  var sq=document.getElementById("sq"),sres=document.getElementById("sres");
  function closeRes(){sres.style.display="none";sres.innerHTML="";}
  function flyTo(v,then){var sc=14,t=d3.zoomIdentity.translate(W/2-sc*v._x,H/2-sc*v._y).scale(sc);svg.transition().duration(700).call(zoom.transform,t).on("end",then);}
  function goTo(v){closeRes();sq.blur();flyTo(v,function(){cluster(curK);spiderId=(groups[v._g]&&groups[v._g].members.length>1)?v._g:null;layout(curK);openCard(v);});}
  function doSearch(q){q=q.trim().toLowerCase();if(!q){closeRes();return;}
    var r=venues.map(function(v){var nm=v.n.toLowerCase(),cy=(v.c||"").toLowerCase(),sk=-1;if(nm.indexOf(q)===0)sk=0;else if(nm.indexOf(q)>0)sk=1;else if(cy.indexOf(q)>=0)sk=2;return{v:v,s:sk};}).filter(function(o){return o.s>=0;}).sort(function(a,b){return a.s-b.s;}).slice(0,6);
    if(!r.length){sres.innerHTML='<div style="color:#8a8a8a;cursor:default">No match — try the venue or city name</div>';sres.style.display="block";return;}
    sres.innerHTML=r.map(function(o){var v=o.v,fl=v.films&&v.films.length?'<span class="film">▶ film</span>':'';return '<div data-i="'+venues.indexOf(v)+'">'+esc(v.n)+' <span class="city">'+esc(v.c)+'</span>'+fl+'</div>';}).join("");
    sres.style.display="block";
    Array.prototype.forEach.call(sres.querySelectorAll("div[data-i]"),function(el){el.onclick=function(){var v=venues[+el.getAttribute("data-i")];sq.value=v.n;goTo(v);};});
  }
  sq.oninput=function(){doSearch(sq.value);};
  sq.onkeydown=function(e){if(e.key==="Enter"){var f=sres.querySelector("div[data-i]");if(f){var v=venues[+f.getAttribute("data-i")];sq.value=v.n;goTo(v);}}};
  sq.onclick=function(e){e.stopPropagation();};
}
Promise.all([d3.json(ATLAS_URL),loadVenues()]).then(function(a){draw(a[0],a[1]);});
</script>
